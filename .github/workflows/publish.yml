name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    environment:
      name: npm
      url: https://www.npmjs.com/package/@convinced/widget-sdk

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Verify the release commit is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use an npm CLI that supports trusted publishing
        run: npm install --global npm@11.18.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.1.13

      - name: Verify the tag matches package.json
        run: |
          package_version=$(node --print "require('./package.json').version")
          test "$RELEASE_TAG" = "v${package_version}"

      - name: Refuse to overwrite an existing npm version
        run: |
          package_name=$(node --print "require('./package.json').name")
          package_version=$(node --print "require('./package.json').version")
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify source, build, and packed consumers
        run: bun run check

      - name: Publish with provenance
        run: npm publish --access public --provenance
